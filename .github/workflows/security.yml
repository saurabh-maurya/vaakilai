name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  # ── Python: Bandit SAST ──────────────────────────────────────────────────────
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit[toml]
      - name: Run Bandit on backend
        run: bandit -r backend/ -ll -x backend/tests/ -f json -o bandit-backend.json
      - name: Run Bandit on ai_service
        run: bandit -r ai_service/ -ll -x ai_service/tests/ -f json -o bandit-ai.json
      - uses: actions/upload-artifact@v7
        with:
          name: bandit-results
          path: bandit-*.json

  # ── Python: pip-audit SCA ────────────────────────────────────────────────────
  pip-audit:
    name: pip-audit (Python SCA)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai_service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit ${{ matrix.service }}
        run: |
          pip-audit -r ${{ matrix.service }}/requirements.txt \
            --output json \
            --output-file pip-audit-${{ matrix.service }}.json
      - uses: actions/upload-artifact@v7
        with:
          name: pip-audit-${{ matrix.service }}
          path: pip-audit-${{ matrix.service }}.json

  # ── Node: npm audit ───────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (Node SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high --json > ../npm-audit.json
      - uses: actions/upload-artifact@v7
        with:
          name: npm-audit
          path: npm-audit.json

  # ── Secrets: Gitleaks ────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks (Secret Scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container: Trivy ─────────────────────────────────────────────────────────
  trivy:
    name: Trivy (Container Scan)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai_service, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t vakilai-${{ matrix.service }}:scan ./${{ matrix.service }}
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vakilai-${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ── Semgrep SAST ─────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (OWASP Top 10 + secrets)
        run: |
          semgrep scan \
            --config "p/python" \
            --config "p/javascript" \
            --config "p/secrets" \
            --config "p/owasp-top-ten" \
            --error \
            --exclude "*/venv/*" \
            --exclude "*/node_modules/*" \
            --json > semgrep.json
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: semgrep-results
          path: semgrep.json

  # ── Security Gate ─────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate
    needs: [bandit, pip-audit, npm-audit, gitleaks, trivy, semgrep, codeql]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Evaluate security gate
        run: |
          python3 - <<'PYEOF'
          import json, sys, os
          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = [k for k, v in needs.items() if v.get("result") not in ("success", "skipped")]
          if failed:
              print(f"SECURITY GATE FAILED — jobs did not pass: {failed}")
              sys.exit(1)
          print("All security checks passed. Gate approved.")
          PYEOF
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}

  # ── CodeQL ───────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: codeql-${{ matrix.language }}
